name: Build Flutter iOS Launcher

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # ఇక్కడే అసలైన మ్యాజిక్ జరుగుతుంది (పాత ఆండ్రాయిడ్ ఫోల్డర్ డిలీట్ చేసి కొత్తది క్రియేట్ చేస్తుంది)
      - name: Recreate Android Folder (V2 Embedding Fix)
        run: |
          rm -rf android
          flutter create --platforms android .
          
      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ios-launcher-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
